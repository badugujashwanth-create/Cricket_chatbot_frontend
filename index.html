<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1115" />
    <title>Cricket Stats AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="chat-sidebar">
        <div class="sidebar-panel">
          <header class="sidebar-header">
            <div class="brand-lockup">
              <span class="brand-badge">CS</span>
              <div>
                <p class="eyebrow">Conversational Command Center</p>
                <h1 class="brand-title">Cricket Stats AI</h1>
              </div>
            </div>

            <div class="archive-status glass-card">
              <div class="status-row">
                <span class="status-dot" aria-hidden="true"></span>
                <span class="status-pill" id="dataset-status-pill">Archive warming</span>
              </div>
              <p class="status-copy" id="dataset-status-copy">Connecting to the local archive and live cricket feeds.</p>
            </div>
          </header>

          <section class="starter-panel glass-card" aria-labelledby="quick-prompts-title">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Prompt Deck</p>
                <h2 id="quick-prompts-title">Quick Commands</h2>
              </div>
            </div>
            <div class="starter-chip-grid" id="starter-chips"></div>
          </section>

          <section class="chat-thread-shell glass-card" aria-labelledby="chat-thread-title">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Live Query Feed</p>
                <h2 id="chat-thread-title">Analyst Relay</h2>
              </div>
            </div>
            <div class="chat-thread" id="chat-thread"></div>
          </section>

          <form class="chat-composer glass-card" id="chat-form">
            <label class="composer-field" for="chat-input">
              <span class="composer-label">Natural Language Control</span>
              <textarea
                id="chat-input"
                rows="1"
                placeholder="Ask for a player profile, a match story, a team snapshot, or a direct comparison..."
                autocomplete="off"
                required
              ></textarea>
            </label>
            <div class="composer-footer">
              <p class="composer-hint">The right canvas reacts to the context of this conversation.</p>
              <button class="send-button" id="send-button" type="submit">Launch Query</button>
            </div>
          </form>
        </div>
      </aside>

      <main class="dynamic-canvas" id="dynamic-canvas">
        <button class="mobile-stage-back" id="mobile-stage-back" type="button">
          <span class="mobile-stage-handle" aria-hidden="true"></span>
          Back to Chat
        </button>

        <div class="canvas-shell">
          <header class="canvas-header" id="stage-header"></header>
          <section class="canvas-body" id="stage-content" aria-live="polite"></section>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
