<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cricket Stats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Cricket Stats</div>
      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-btn is-active" data-page="home" type="button">Home</button>
        <button class="nav-btn" data-page="players" type="button">Players</button>
        <button class="nav-btn" data-page="matches" type="button">Matches</button>
        <button class="nav-btn" data-page="compare" type="button">Compare</button>
        <button class="nav-btn" data-page="chat" type="button">Chat</button>
      </nav>
    </header>

    <main class="layout">
      <section class="page is-active" id="page-home">
        <h1>Cricket Stats</h1>
        <p class="subline">Quick look at players, teams, and matches in this dataset.</p>

        <h2>Quick Stats</h2>
        <div class="grid-4" id="home-quick-stats"></div>

        <h2>Top Players</h2>
        <div class="grid-3" id="home-top-players"></div>

        <h2>Recent Matches</h2>
        <div class="grid-3" id="home-recent-matches"></div>
      </section>

      <section class="page" id="page-players">
        <h1>Players</h1>
        <div class="toolbar">
          <input id="players-search" type="text" placeholder="Search player name" />
          <button id="players-search-btn" type="button">Search</button>
        </div>

        <div class="grid-3" id="players-list"></div>

        <div class="pager">
          <button id="players-prev" type="button">Previous</button>
          <span id="players-page-label"></span>
          <button id="players-next" type="button">Next</button>
        </div>

        <article class="detail-card hidden" id="player-detail"></article>
      </section>

      <section class="page" id="page-matches">
        <h1>Matches</h1>
        <div class="toolbar wrap">
          <select id="matches-team-filter">
            <option value="">All teams</option>
          </select>
          <select id="matches-season-filter">
            <option value="">All seasons</option>
          </select>
          <select id="matches-venue-filter">
            <option value="">All venues</option>
          </select>
          <button id="matches-apply-filter" type="button">Apply</button>
        </div>

        <div class="grid-2" id="matches-list"></div>

        <div class="pager">
          <button id="matches-prev" type="button">Previous</button>
          <span id="matches-page-label"></span>
          <button id="matches-next" type="button">Next</button>
        </div>

        <article class="detail-card hidden" id="match-detail"></article>
      </section>

      <section class="page" id="page-compare">
        <h1>Compare Players</h1>
        <p class="subline">Pick two players to compare side by side.</p>

        <div class="toolbar">
          <input id="compare-player-1" type="text" list="player-options" placeholder="Player 1" />
          <input id="compare-player-2" type="text" list="player-options" placeholder="Player 2" />
          <button id="compare-run" type="button">Compare</button>
          <datalist id="player-options"></datalist>
        </div>

        <div id="compare-result"></div>
      </section>

      <section class="page" id="page-chat">
        <h1>Chat</h1>
        <p class="subline">Ask questions in plain words.</p>

        <div class="chip-row" id="chat-suggestions">
          <button type="button" class="chip" data-question="Virat Kohli stats">Virat Kohli stats</button>
          <button type="button" class="chip" data-question="Top run scorers 2019">Top run scorers 2019</button>
          <button type="button" class="chip" data-question="Most wickets 2020">Most wickets 2020</button>
        </div>

        <div class="chat-box" id="chat-messages"></div>

        <form class="chat-input" id="chat-form">
          <input
            id="chat-question"
            type="text"
            placeholder="Type your cricket question"
            autocomplete="off"
            required
          />
          <button id="chat-send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
